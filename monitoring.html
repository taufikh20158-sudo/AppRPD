<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Luarbiasa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="monitoring.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body id="MASTERMAIN">
<nav id="TINY_NAV">
    <div class="nav-stack">
        <div class="dropdown">
            <button class="btn-tiny">DATA ▼</button>
            <div class="dropdown-items">
                <a href="#" id="linkRPD">RPD</a>
                <a href="#" id="linkREAL">REALISASI</a>
            </div>
        </div>
        <button type="button" id="btnPDF" class="btn-tiny btn-red">PDF</button>
    </div>
</nav>
    <main id="MAIN_CONTENT_AREA">
        <div id="CON1">
            <div id="HEADER_BAR" class="grid-row header-style">
                <div id="HEAD_KODE" class="bold">KODE</div>
                <div id="HEAD_NAMA" class="bold">NAMA KEGIATAN</div>
                <div id="HEAD_PAGU" class="bold text-right">PAGU</div>
                
                <div id="HEAD_BULAN_GROUP">
                    <span>JAN</span><span>FEB</span><span>MAR</span>
                    <span>APR</span><span>MEI</span><span>JUN</span>
                    <span>JUL</span><span>AGS</span><span>SEP</span>
                    <span>OKT</span><span>NOV</span><span>DES</span>
                </div>

                <div id="HEAD_TOTAL" class="bold text-right" style="color: #4ade80;">TOTAL</div>
                <div id="HEAD_BLOKIR" class="bold text-right" style="color: #e80a0a;">BLOKIR</div>
                <div id="HEAD_SISA" class="bold text-right" style="color: #afd919;">SISA DANA</div>
            </div>
        </div>

        <div id="CON2"></div>
    </main>

    <script>
        function logoutSession() {
            if(confirm("Apakah Anda yakin ingin keluar?")) {
                window.location.href = "login.html";
            }
        }
    </script>
    <script src="monitoring.js"></script>
</body>            
</html>
